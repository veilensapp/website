<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#284a5c"/>
      <stop offset="1" stop-color="#122632"/>
    </linearGradient>
    <linearGradient id="race" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb05c"/>
      <stop offset="1" stop-color="#ff7a1c"/>
    </linearGradient>
    <clipPath id="sq"><rect x="6" y="6" width="88" height="88" rx="20"/></clipPath>
  </defs>
  <rect x="6" y="6" width="88" height="88" rx="20" fill="url(#bg)"/>
  <g clip-path="url(#sq)">
    <!-- orange millrace across the lower third -->
    <path d="M6 64 q11 8 22 0 t22 0 22 0 22 0 L94 94 L6 94 Z" fill="url(#race)"/>
    <!-- wheel -->
    <g fill="none" stroke="#f5f8fc" stroke-linecap="round">
      <g stroke-width="3">
        <line x1="50" y1="50" x2="50" y2="22"/>
        <line x1="50" y1="50" x2="70" y2="30"/>
        <line x1="50" y1="50" x2="78" y2="50"/>
        <line x1="50" y1="50" x2="70" y2="70"/>
        <line x1="50" y1="50" x2="50" y2="78"/>
        <line x1="50" y1="50" x2="30" y2="70"/>
        <line x1="50" y1="50" x2="22" y2="50"/>
        <line x1="50" y1="50" x2="30" y2="30"/>
      </g>
      <circle cx="50" cy="50" r="28" stroke-width="5"/>
    </g>
    <!-- bottom paddle boards dipping into the race -->
    <g fill="#cedae6">
      <rect x="46" y="76" width="8" height="6" rx="1"/>
      <rect x="30" y="70" width="8" height="6" rx="1" transform="rotate(-40 34 73)"/>
      <rect x="62" y="70" width="8" height="6" rx="1" transform="rotate(40 66 73)"/>
    </g>
    <!-- hub with orange centre -->
    <circle cx="50" cy="50" r="7" fill="#f5f8fc"/>
    <circle cx="50" cy="50" r="3" fill="#ff7a1c"/>
  </g>
</svg>
